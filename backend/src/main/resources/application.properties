server.port=${SERVER_PORT:8080}

# ================================
# Database
# ================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finapp_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# Connection Pool (HikariCP)
# ================================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_TIMEOUT:30000}

# ================================
# JWT
# ================================
app.jwt.secret=${JWT_SECRET:yDyY053TGErO6TexKPtwgZKEMwlldg8hZdoD55W+zmI=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ================================
# CORS
# ================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ================================
# Logging
# ================================
logging.level.com.finapp=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
