version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finapp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: finapp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finapp_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/finapp_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: finapp_password
      APP_JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNA==
      APP_JWT_EXPIRATION_MS: 86400000
      APP_CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
